name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip-build:
        description: "Skip Docker build (redeploy existing latest image)"
        required: false
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 2

      - uses: docker/setup-buildx-action@v3
        timeout-minutes: 2
        if: ${{ !inputs.skip-build }}

      - uses: docker/login-action@v3
        timeout-minutes: 2
        if: ${{ !inputs.skip-build }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # None of these NEXT_PUBLIC_* vars are secret — kept as plain repo Variables
      # (Settings > Secrets and variables > Actions > Variables), not routed through sops,
      # since they're baked into the client bundle at build time either way and there's no
      # confidentiality to protect.
      - uses: docker/build-push-action@v6
        timeout-minutes: 10
        if: ${{ !inputs.skip-build }}
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_DOCS_URL=${{ vars.NEXT_PUBLIC_DOCS_URL }}
            NEXT_PUBLIC_DASHBOARD_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_URL }}
            NEXT_PUBLIC_DASHBOARD_API_URL=${{ vars.NEXT_PUBLIC_DASHBOARD_API_URL }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: appleboy/ssh-action@v1
        timeout-minutes: 5
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SOPS_AGE_KEY,HGATEWAY_WEBSITE_IMAGE,GHCR_USERNAME,GHCR_PAT
          script: |
            set -euo pipefail
            cd /opt/theved/hgateway-website
            git pull
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            mkdir -p envs/plain
            echo "$SOPS_AGE_KEY" > /tmp/age.key
            export SOPS_AGE_KEY_FILE=/tmp/age.key
            sops --decrypt --input-type dotenv --output-type dotenv envs/enc/.env.prod.enc > envs/plain/.env.prod
            unset SOPS_AGE_KEY_FILE
            rm /tmp/age.key
            echo "HGATEWAY_WEBSITE_IMAGE=$HGATEWAY_WEBSITE_IMAGE" >> envs/plain/.env.prod
            docker compose --env-file envs/plain/.env.prod pull hgateway-website
            docker compose --env-file envs/plain/.env.prod up -d hgateway-website

            # Fail the job (not just leave a broken container running) if the new image never
            # becomes healthy — gates GHCR retention and image pruning below.
            for i in $(seq 1 10); do
              docker compose --env-file envs/plain/.env.prod exec -T hgateway-website curl -sf http://localhost:3000/health && break
              sleep 3
            done
            docker compose --env-file envs/plain/.env.prod exec -T hgateway-website curl -sf http://localhost:3000/health || {
              echo "healthcheck failed"
              docker compose --env-file envs/plain/.env.prod logs --tail=50 hgateway-website
              exit 1
            }

            # Only reached once the new container is confirmed healthy.
            docker image prune -f
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          # skip-build dispatches redeploy whatever :latest already is in GHCR (no new tag was
          # built this run); everything else (tag push, or a dispatch that did build) deploys the
          # tag matching this run's ref.
          HGATEWAY_WEBSITE_IMAGE: ${{ inputs.skip-build && format('ghcr.io/{0}:latest', github.repository) || format('ghcr.io/{0}:{1}', github.repository, github.ref_name) }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - uses: actions/delete-package-versions@v5
        timeout-minutes: 2
        if: ${{ !inputs.skip-build }}
        with:
          package-name: hgateway-website
          package-type: container
          min-versions-to-keep: 3
